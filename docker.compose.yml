version: '3.8'

services:

  # ─────────────────────────────────────────
  # REDIS PRIMARY
  # ─────────────────────────────────────────
  redis-primary:
    image: redis:7-alpine
    container_name: redis-primary
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-primary-data:/data
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  # REDIS REPLICAS
  # ─────────────────────────────────────────
  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    command: redis-server --replicaof redis-primary 6379 --appendonly yes
    depends_on:
      redis-primary:
        condition: service_healthy
    networks:
      - sentinel-network

  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    command: redis-server --replicaof redis-primary 6379 --appendonly yes
    depends_on:
      redis-primary:
        condition: service_healthy
    networks:
      - sentinel-network

  # ─────────────────────────────────────────
  # REDIS SENTINELS (3 for quorum)
  # ─────────────────────────────────────────
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-primary 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-server /tmp/sentinel.conf --sentinel"
    ports:
      - "26379:26379"
    depends_on:
      - redis-primary
      - redis-replica-1
      - redis-replica-2
    networks:
      - sentinel-network

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-primary 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-server /tmp/sentinel.conf --sentinel"
    ports:
      - "26380:26380"
    depends_on:
      - redis-primary
      - redis-replica-1
      - redis-replica-2
    networks:
      - sentinel-network

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-primary 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-server /tmp/sentinel.conf --sentinel"
    ports:
      - "26381:26381"
    depends_on:
      - redis-primary
      - redis-replica-1
      - redis-replica-2
    networks:
      - sentinel-network

  # ─────────────────────────────────────────
  # DUMMY BACKEND SERVICE
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # API GATEWAY (scalable — run 2 instances)
  # ─────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: sentinel-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_SENTINELS=redis-sentinel-1:26379,redis-sentinel-2:26380,redis-sentinel-3:26381
      - REDIS_MASTER_NAME=mymaster
      - BACKEND_URL=http://backend:4000
      - ML_SERVICE_URL=http://ml-service:5000
      - DEFAULT_RATE_LIMIT_ALGORITHM=token-bucket
      - DEFAULT_CREDIT_BUDGET=1000
    depends_on:
      - redis-sentinel-1
      - redis-sentinel-2
      - redis-sentinel-3
      - backend
      - ml-service
    networks:
      - sentinel-network

  # ─────────────────────────────────────────
  # ML ADAPTIVE RATE LIMIT SERVICE
  # ─────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: sentinel-ml
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - REDIS_SENTINELS=redis-sentinel-1:26379,redis-sentinel-2:26380,redis-sentinel-3:26381
      - REDIS_MASTER_NAME=mymaster
    depends_on:
      - redis-sentinel-1
    networks:
      - sentinel-network

  # ─────────────────────────────────────────
  # REACT DASHBOARD
  # ─────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    ports:
      - "8080:80"
    depends_on:
      - gateway
    networks:
      - sentinel-network

# ─────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────
volumes:
  redis-primary-data:

networks:
  sentinel-network:
    driver: bridge